<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fdfbf7" />
      <stop offset="100%" stop-color="#f5f2eb" />
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#grad)" />
  <g transform="translate(50, 50) scale(0.9)">
    <!-- 5 petals beautifully shaped for a cherry blossom / sakura flower -->
    <path d="M0,0 C-15,-35 -30,-25 -30,0 C-30,15 -15,10 0,0" fill="#e5989b" opacity="0.9" />
    <path d="M0,0 C15,-35 30,-25 30,0 C30,15 15,10 0,0" fill="#e5989b" opacity="0.9" transform="rotate(72)" />
    <path d="M0,0 C15,-35 30,-25 30,0 C30,15 15,10 0,0" fill="#e5989b" opacity="0.9" transform="rotate(144)" />
    <path d="M0,0 C15,-35 30,-25 30,0 C30,15 15,10 0,0" fill="#e5989b" opacity="0.9" transform="rotate(216)" />
    <path d="M0,0 C15,-35 30,-25 30,0 C30,15 15,10 0,0" fill="#e5989b" opacity="0.9" transform="rotate(288)" />
    <circle cx="0" cy="0" r="5" fill="#9ba37a" />
    <!-- Small elegant pistils -->
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#9ba37a" stroke-width="1.5" />
    <circle cx="0" cy="-12" r="1.5" fill="#9ba37a" />
    <line x1="0" y1="0" x2="11" y2="-5" stroke="#9ba37a" stroke-width="1.5" />
    <circle cx="11" cy="-5" r="1.5" fill="#9ba37a" />
    <line x1="0" y1="0" x2="7" y2="9" stroke="#9ba37a" stroke-width="1.5" />
    <circle cx="7" cy="9" r="1.5" fill="#9ba37a" />
    <line x1="0" y1="0" x2="-7" y2="9" stroke="#9ba37a" stroke-width="1.5" />
    <circle cx="-7" cy="9" r="1.5" fill="#9ba37a" />
    <line x1="0" y1="0" x2="-11" y2="-5" stroke="#9ba37a" stroke-width="1.5" />
    <circle cx="-11" cy="-5" r="1.5" fill="#9ba37a" />
  </g>
</svg>
